<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agentic Loop — Flowchart (dark)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* dark palette — slate-950 + bright accent borders
     See ../SKILL.md §Color Palette */
  :root {
    --bg:             #020617;
    --text:           #E2E8F0;
    --label-text:     #94A3B8;
    --action-fill:    rgba(19,78,74,0.4);
    --action-stroke:  #2DD4BF;
    --agent-fill:     rgba(14,116,144,0.35);
    --agent-stroke:   #22D3EE;
    --terminal-fill:  rgba(30,41,59,0.5);
    --terminal-stroke:#94A3B8;
    --data-fill:      rgba(76,29,149,0.4);
    --data-stroke:    #A78BFA;
    --state-fill:     rgba(120,53,15,0.4);
    --state-stroke:   #FBBF24;
    --callout-fill:   rgba(251,146,60,0.25);
    --callout-stroke: #FB923C;
    --callout-text:   #FDBA74;
    --decision-fill:  rgba(30,58,138,0.4);   --decision-stroke: #60A5FA;
    --event-fill:     rgba(136,19,55,0.35);  --event-stroke:    #FB7185;
    --accent1-fill:   rgba(6,78,59,0.4);     --accent1-stroke:  #34D399;
    --accent2-fill:   rgba(112,26,117,0.4);  --accent2-stroke:  #E879F9;
    --flow-line:      #94A3B8;
    --flow-loopback:  #2DD4BF;
    --container:      #475569;
    --container-lbl:  #94A3B8;
    --font: "Inter", "Söhne", -apple-system, BlinkMacSystemFont, "Segoe UI",
            Helvetica, Arial, sans-serif;
  }

  html, body { margin: 0; padding: 0; background: var(--bg); font-family: var(--font); }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 0; box-sizing: border-box; }
  .diagram { width: 100%; max-width: 825px; }
  svg { width: 100%; height: auto; display: block; }

  #arrow-flow     path { fill: var(--flow-line); }
  #arrow-loopback path { fill: var(--flow-loopback); }
  #arrow-callout  path { fill: var(--callout-stroke); }

  .container-box   { fill: rgba(148,163,184,0.07); stroke: #94A3B8; stroke-width: 2; stroke-dasharray: 6 6; }  /* gray group-box tint */
  .container-gap   { fill: var(--bg); }
  .container-label { font-weight: 500; font-size: 16px; fill: var(--container-lbl); letter-spacing: 0.01em; }

  .flow-arrow        { stroke: var(--flow-line); stroke-width: 5; fill: none;
                       stroke-linecap: round; stroke-linejoin: round; }
  .flow-arrow.dashed { stroke-width: 3; stroke-dasharray: 7 5; }
  .loopback-arrow    { stroke: var(--flow-loopback); stroke-width: 5; fill: none;
                       stroke-linecap: round; stroke-linejoin: round; }
  .callout-arrow     { stroke: var(--callout-stroke); stroke-width: 3; fill: none;
                       stroke-dasharray: 7 5; stroke-linecap: round; }

  .edge-label    { font-weight: 500; font-size: 18px; fill: var(--label-text); }
  .edge-label-bg { fill: var(--bg); }

  /* Dark theme: ALL roles carry an accent border for edge definition,
     at a uniform 2px width (data / state / callout are NOT thicker). */
  .node-label    { font-weight: 700; font-size: 18px; fill: var(--text); }
  .node-sublabel { font-weight: 500; font-size: 12px; fill: var(--label-text); }
  .role-action   { fill: var(--action-fill);   stroke: var(--action-stroke);   stroke-width: 2; }
  .role-agent    { fill: var(--agent-fill);    stroke: var(--agent-stroke);    stroke-width: 2; }
  .role-terminal { fill: var(--terminal-fill); stroke: var(--terminal-stroke); stroke-width: 2; }
  .data-rect     { fill: var(--data-fill);     stroke: var(--data-stroke);     stroke-width: 2; }
  .state-rect    { fill: var(--state-fill);    stroke: var(--state-stroke);    stroke-width: 2; }
  .role-decision { fill: var(--decision-fill); stroke: var(--decision-stroke); stroke-width: 2; }
  .role-event    { fill: var(--event-fill);    stroke: var(--event-stroke);    stroke-width: 2; }
  .role-accent1  { fill: var(--accent1-fill);  stroke: var(--accent1-stroke);  stroke-width: 2; }
  .role-accent2  { fill: var(--accent2-fill);  stroke: var(--accent2-stroke);  stroke-width: 2; }

  .callout-box   { fill: var(--callout-fill); stroke: var(--callout-stroke); stroke-width: 2; }
  .callout-label { font-weight: 500; font-size: 18px; fill: var(--callout-text); }

  .legend-label  { font-weight: 500; font-size: 18px; fill: var(--label-text); }
</style>
</head>
<body>
<div class="diagram">
<!-- viewBox 1500×432 — default canvas (display 825 → scale 0.55) with 50px symmetric padding.
  Content x=50→1450, y=50→382. Container y=60-250, callout y=280-340, legend y=370-382.
  Legend items spaced sequentially by text width (≥24px between items) — never a fixed pitch. -->
<svg width="825" height="238" viewBox="0 0 1500 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agentic loop flowchart">

  <defs>
    <marker id="arrow-flow" viewBox="0 0 14 12" refX="0" refY="6"
            markerWidth="14" markerHeight="12"
            markerUnits="userSpaceOnUse" orient="auto">
      <path d="M 0 0 L 14 6 L 0 12 z" />
    </marker>
    <marker id="arrow-loopback" viewBox="0 0 14 12" refX="0" refY="6"
            markerWidth="14" markerHeight="12"
            markerUnits="userSpaceOnUse" orient="auto">
      <path d="M 0 0 L 14 6 L 0 12 z" />
    </marker>
    <marker id="arrow-callout" viewBox="0 0 14 12" refX="0" refY="6"
            markerWidth="14" markerHeight="12"
            markerUnits="userSpaceOnUse" orient="auto">
      <path d="M 0 0 L 14 6 L 0 12 z" />
    </marker>
  </defs>

  <!-- 1. Container (wraps Gather / Take / Verify; 50px side, 60/70 top/bottom inner padding) -->
  <g class="container">
    <rect class="container-box" x="310" y="60" width="960" height="190" rx="20" ry="20" />
    <rect class="container-gap" x="730" y="50" width="120" height="20" />
    <text class="container-label" x="790" y="65" text-anchor="middle">agentic loop</text>
  </g>

  <!-- 2. Loopback: Verify center (1110) back to Gather center (480), behind nodes -->
  <path class="loopback-arrow"
        d="M 1110,180
           L 1110,206 Q 1110,218 1098,218
           L 492,218 Q 480,218 480,206
           L 480,194"
        marker-end="url(#arrow-loopback)" />

  <!-- 3. Forward flow arrows (horizontal at y=150) -->
  <g>
    <line class="flow-arrow" x1="250"  y1="150" x2="346"  y2="150" marker-end="url(#arrow-flow)" />
    <line class="flow-arrow" x1="600"  y1="150" x2="696"  y2="150" marker-end="url(#arrow-flow)" />
    <line class="flow-arrow" x1="890"  y1="150" x2="986"  y2="150" marker-end="url(#arrow-flow)" />
    <line class="flow-arrow" x1="1220" y1="150" x2="1316" y2="150" marker-end="url(#arrow-flow)" />
  </g>

  <!-- 4. Callout arrow — single-elbow RIGHT from callout right-center, UP to container bottom-center -->
  <path class="callout-arrow" d="M 430,310 L 778,310 Q 790,310 790,298 L 790,264"
        marker-end="url(#arrow-callout)" />

  <!-- 5. Nodes -->
  <rect class="role-terminal" x="50"   y="120" width="200" height="60" rx="12" ry="12" />
  <text class="node-label"    x="150"  y="157" text-anchor="middle">Your prompt</text>

  <rect class="role-terminal" x="1330" y="120" width="120" height="60" rx="12" ry="12" />
  <text class="node-label"    x="1390" y="157" text-anchor="middle">Done</text>

  <rect class="role-action"   x="360"  y="120" width="240" height="60" rx="12" ry="12" />
  <text class="node-label"    x="480"  y="157" text-anchor="middle">Gather context</text>

  <rect class="role-action"   x="710"  y="120" width="180" height="60" rx="12" ry="12" />
  <text class="node-label"    x="800"  y="157" text-anchor="middle">Take action</text>

  <rect class="role-action"   x="1000" y="120" width="220" height="60" rx="12" ry="12" />
  <text class="node-label"    x="1110" y="157" text-anchor="middle">Verify results</text>

  <!-- 6. Callout box (60 tall, single 18px line) -->
  <rect class="callout-box" x="50" y="280" width="380" height="60" rx="12" ry="12" />
  <text class="callout-label" x="240" y="317" text-anchor="middle">You: interrupt, steer, or add context</text>

  <!-- 7. Legend — items spaced sequentially by text width (no fixed pitch, ≥24px between items) -->
  <g class="legend" transform="translate(50, 370)">
    <g transform="translate(0, 0)">
      <rect class="role-terminal" width="22" height="12" rx="3" />
      <text x="30" y="10" class="legend-label">terminal</text>
    </g>
    <g transform="translate(135, 0)">
      <rect class="role-action" width="22" height="12" rx="3" />
      <text x="30" y="10" class="legend-label">action</text>
    </g>
    <g transform="translate(250, 0)">
      <rect class="callout-box" width="22" height="12" rx="3" />
      <text x="30" y="10" class="legend-label">callout</text>
    </g>
  </g>

</svg>
</div>
</body>
</html>
