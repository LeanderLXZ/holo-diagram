  <line class="flow-arrow green" x1="1165" y1="190" x2="1316" y2="190" marker-end="url(#arrow-loopback)" />
  <line class="flow-arrow dashed" x1="400" y1="220" x2="400" y2="286" marker-end="url(#arrow-flow)" />
  <path class="flow-arrow dashed" d="M 650,220 L 650,458 Q 650,470 662,470 L 816,470" marker-end="url(#arrow-flow)" />
  <path class="flow-arrow dashed" d="M 650,318 Q 650,330 662,330 L 816,330" marker-end="url(#arrow-flow)" />
  <path class="flow-arrow dashed" d="M 1010,330 L 1077,330 A 8 8 0 0 1 1093,330 L 1196,330" marker-end="url(#arrow-flow)" />
  <path class="flow-arrow dashed" d="M 1010,470 L 1077,470 A 8 8 0 0 1 1093,470 L 1196,470" marker-end="url(#arrow-flow)" />
  <g transform="translate(1248,176)">
