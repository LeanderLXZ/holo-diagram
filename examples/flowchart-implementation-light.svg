  <line class="flow-arrow green" x1="998" y1="190" x2="1080" y2="190" marker-end="url(#arrow-loopback)" />
  <line class="flow-arrow dashed" x1="1214" y1="190" x2="1296" y2="190" marker-end="url(#arrow-flow)" />
  <line class="flow-arrow" x1="642" y1="220" x2="642" y2="258" />
  <path class="flow-arrow" d="M 642,258 Q 642,270 630,270 L 494,270 Q 482,270 482,282 L 482,326" marker-end="url(#arrow-flow)" />
  <path class="flow-arrow" d="M 642,258 Q 642,270 654,270 L 790,270 Q 802,270 802,282 L 802,326" marker-end="url(#arrow-flow)" />
  <path class="flow-arrow dashed" d="M 1154,220 L 1154,358 Q 1154,370 1166,370 L 1173,370" marker-end="url(#arrow-flow)" />
  <path class="flow-arrow dashed" d="M 1347,370 L 1368,370 Q 1380,370 1380,358 L 1380,234" marker-end="url(#arrow-flow)" />
  <g transform="translate(1046,176)">
